################################################################################
# Board needs minimized footprint, otherwise the application will not fit
CONFIG_SCHED_SIMPLE=y
CONFIG_WAITQ_SIMPLE=y
CONFIG_MINIMAL_LIBC=y
#CONFIG_LOG_MODE_IMMEDIATE=y # in conflict with DEFERRED!
# ERR&WRN&INF&DBG=4, ERR&WRN&INF=3, ERR&WRN=2, ERR=1, (None)=0
#CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_SPEED=n
CONFIG_LOG_PROCESS_THREAD=n
CONFIG_LIBFIXMATH_SINLUT=n
CONFIG_ISR_STACK_SIZE=512
CONFIG_IDLE_STACK_SIZE=128
# We don't use a main thread, but I have not checked whether the main stack is necessary
CONFIG_MAIN_STACK_SIZE=512
CONFIG_SPI=n
CONFIG_I2C=n
CONFIG_PWM=n
CONFIG_ADC=n
CONFIG_CAN=n

CONFIG_DEBUG=n
CONFIG_DEBUG_THREAD_INFO=y

CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y
#CONFIG_LOG_BUFFER_SIZE=2560

# ASSERT is important to determine system health, but the application won't fit ROM with it enabled
CONFIG_ASSERT=n

# Activate UART serial connection (Debug, Magni, RPLIDAR)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

#CONFIG_SRAM_VECTOR_TABLE=y
#CONFIG_SRAM_SW_ISR_TABLE=y

################################################################################
# Include Magni Driver
#CONFIG_APPLICATION_DEFINED_SYSCALL=y
CONFIG_UR_MAGNI_DRIVER=y

# Include Slamtech RPLidar Driver
CONFIG_RPLIDAR=y
CONFIG_RPLIDAR_EXPRESS_MODE=n

################################################################################
