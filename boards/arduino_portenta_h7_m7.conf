################################################################################

# Activate UART serial connection (Debug, Magni, RPLIDAR)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# USB CDC ACM is the default serial interface for this board, but it creates a number of additional threads we don't want in our comparison
CONFIG_USB_CDC_ACM=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n

# Overflow protection
CONFIG_HW_STACK_PROTECTION=y

CONFIG_SRAM_VECTOR_TABLE=y
CONFIG_SRAM_SW_ISR_TABLE=y

################################################################################
# Include Magni Driver
CONFIG_APPLICATION_DEFINED_SYSCALL=y
CONFIG_UR_MAGNI_DRIVER=y

# Include Slamtech RPLidar Driver
CONFIG_RPLIDAR=y

################################################################################
