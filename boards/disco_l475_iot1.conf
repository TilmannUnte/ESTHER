# Activate UART serial connection (Debug, Magni, RPLIDAR)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Activate I2C (Magni expansion bus)
#CONFIG_I2C=y

# Activate PWM (RC Receiver, RPLIDAR motor)
CONFIG_PWM=y
CONFIG_PWM_CAPTURE=y

# Activate GPIO ("User" button, HC-SR04)
#CONFIG_GPIO=y

# Uncomment if you want to shut down the system (useful for reliable termination)
#CONFIG_POWEROFF=y

# Overflow protection
CONFIG_HW_STACK_PROTECTION=y

CONFIG_SRAM_VECTOR_TABLE=y
CONFIG_SRAM_SW_ISR_TABLE=y

# Activates Task Watchdog functionality (deactivate for debugging sessions)
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_CHANNELS=100
CONFIG_TASK_WDT_MIN_TIMEOUT=1
CONFIG_TASK_WDT_HW_FALLBACK=y
CONFIG_TASK_WDT_HW_FALLBACK_DELAY=10000
#CONFIG_WDT_LOG_LEVEL_DBG=y
CONFIG_WDT_DISABLE_AT_BOOT=y

################################################################################
# Include Magni Driver
CONFIG_APPLICATION_DEFINED_SYSCALL=y
CONFIG_UR_MAGNI_DRIVER=y
#CONFIG_UR_MAGNI_EXPANDER=y

# Activate display driver to use Magni's SH1106 OLED
# also activates I2C, but we have multiple devices, so we did it seperately
#CONFIG_DISPLAY=y

# Include Slamtech RPLidar Driver
CONFIG_RPLIDAR=y
CONFIG_RPLIDAR_MOTOR_CTRL=y

# ST sensor drivers
CONFIG_SENSOR=y
CONFIG_LIS3MDL=n
#CONFIG_LIS3MDL_TRIGGER_GLOBAL_THREAD=y
#CONFIG_LIS3MDL_ODR="10"
#CONFIG_LIS3MDL_FS=4
CONFIG_LSM6DSL=n
#CONFIG_LSM6DSL_TRIGGER_GLOBAL_THREAD=y
#CONFIG_LSM6DSL_GYRO_FS=125
#CONFIG_LSM6DSL_GYRO_ODR=1
#CONFIG_LSM6DSL_ACCEL_FS=2
#CONFIG_LSM6DSL_ACCEL_ODR=1
CONFIG_VL53L0X=n
