# Board specific setting making life easier
CONFIG_BOOTLOADER_MCUBOOT=y

# Activate UART serial connection (Debug, Magni, RPLIDAR)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

CONFIG_SRAM_SW_ISR_TABLE=y

# Activates Task Watchdog functionality (deactivate for debugging sessions)
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_CHANNELS=100
CONFIG_TASK_WDT_MIN_TIMEOUT=1
CONFIG_TASK_WDT_HW_FALLBACK=y
CONFIG_TASK_WDT_HW_FALLBACK_DELAY=10000
#CONFIG_WDT_LOG_LEVEL_DBG=y
CONFIG_WDT_DISABLE_AT_BOOT=y

################################################################################
# Include Magni Driver
CONFIG_APPLICATION_DEFINED_SYSCALL=y
CONFIG_UR_MAGNI_DRIVER=y

# Include Slamtech RPLidar Driver
CONFIG_RPLIDAR=y
